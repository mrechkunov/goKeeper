edition = "2023";

package mrechkunov.goKeeper.proto;

option go_package = "github.com/mrechkunov/goKeeper.git/proto"; 

service GoKeeper {
  rpc RegisterUser (User) returns (StatusResponce);
  rpc GetPassHash (User) returns (User);
  rpc AuthenticateUser (User) returns (User); // return token in metadata if login & pass is correct
  rpc EditUser (User) returns (User); // change password
  rpc DeleteUser (User) returns (StatusResponce);
}

message User {
    string login = 1;
    string passwordHash = 2;
}

message StatusResponce {
    string result = 1;
}
