edition = "2023";

package mrechkunov.goKeeper.proto;

option go_package = "github.com/mrechkunov/goKeeper.git/proto"; 

service GoKeeper {
  rpc RegisterUser (User) returns (StatusResponce);
  rpc AuthenticateUser (User) returns (User); // return pass from db by login
  rpc AuthorizateUser (User) returns (User); // возвращает пользователя с заполненым полем uuid и MD с полем authirizate
  rpc EditUser (User) returns (StatusResponce); // change password
  rpc DeleteUser (User) returns (StatusResponce);
}

message User {
    string login = 1;
    string passwordHash = 2;
}

message StatusResponce {
    string result = 1;
}
